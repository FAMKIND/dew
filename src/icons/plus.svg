<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
  <!-- Icon Name: plus -->
  <!-- Keyline: square (18×18, centered) -->
  <!-- Construction: vertical line (12,3)→(12,21) crossing horizontal line (3,12)→(21,12).
       Both lines equal length (18px), crossing at exact center (12,12). -->

  <g id="outline" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="3"  x2="12" y2="21" />
    <line x1="3"  y1="12" x2="21" y2="12" />
  </g>

  <g id="fill" style="display:none">
    <!-- Plus is open paths — thicker stroke for fill weight -->
    <line x1="12" y1="3"  x2="12" y2="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
    <line x1="3"  y1="12" x2="21" y2="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
