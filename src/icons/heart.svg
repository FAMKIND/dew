<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
  <!-- Icon Name: heart -->
  <!-- Keyline: square (18×18, centered) -->
  <!-- Construction: classic heart shape. Two arcs forming the top bumps meeting at a center-top
       dip, then two diagonal lines converging to a point at the bottom.
       Using cubic beziers: left arc from (12,8) to (5,8) to (3,13) sweeping to (12,20);
       right arc symmetric. The SVG heart formula:
       M 12,20 C 4,15 2,10 2,8 C 2,5 4.5,3 7,3 C 9,3 11,4.5 12,6 C 13,4.5 15,3 17,3 C 19.5,3 22,5 22,8 C 22,10 20,15 12,20 Z -->
  <!-- Optical: bottom point at y=20 for full vertical extent; top bumps at y=3 for symmetry -->

  <g id="outline" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 12,20 C 4,15 2,10 2,8 C 2,5 4.5,3 7,3 C 9,3 11,4.5 12,6 C 13,4.5 15,3 17,3 C 19.5,3 22,5 22,8 C 22,10 20,15 12,20 Z" />
  </g>

  <g id="fill" style="display:none">
    <!-- Solid heart — the quintessential fill variant -->
    <path fill="currentColor" stroke="none" d="M 12,20 C 4,15 2,10 2,8 C 2,5 4.5,3 7,3 C 9,3 11,4.5 12,6 C 13,4.5 15,3 17,3 C 19.5,3 22,5 22,8 C 22,10 20,15 12,20 Z" />
  </g>
</svg>
