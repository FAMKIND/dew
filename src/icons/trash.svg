<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
  <!-- Icon Name: trash -->
  <!-- Keyline: portrait (14×20, centered) -->
  <!-- Construction: rectangular can body (5,8)→(19,21). Lid: wider rect (3,6)→(21,8), rx=1.
       Handle: short arc/line (10,6)→(10,4)→(14,4)→(14,6) — a small arch on top.
       Two vertical interior lines at x=9 and x=15 suggest compartments — kept at minimal detail. -->
  <!-- Optical: lid extends 2px beyond body on each side; handle is minimal so it reads at 16px -->

  <g id="outline" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Handle arch -->
    <path d="M 10,6 L 10,4 Q 10,3 11,3 L 13,3 Q 14,3 14,4 L 14,6" />
    <!-- Lid -->
    <line x1="3" y1="6" x2="21" y2="6" />
    <!-- Body -->
    <path d="M 5,8 L 5,20 Q 5,21 6,21 L 18,21 Q 19,21 19,20 L 19,8 Z" />
    <!-- Interior lines -->
    <line x1="9"  y1="10" x2="9"  y2="18" />
    <line x1="15" y1="10" x2="15" y2="18" />
  </g>

  <g id="fill" style="display:none">
    <!-- Solid can body; interior lines become negative space -->
    <!-- Handle -->
    <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
          d="M 10,6 L 10,4 Q 10,3 11,3 L 13,3 Q 14,3 14,4 L 14,6" />
    <!-- Lid as solid rect -->
    <rect x="3" y="5.25" width="18" height="1.5" rx="0.75" fill="currentColor" stroke="none" />
    <!-- Body solid with interior lines as cutouts -->
    <path fill="currentColor" stroke="none" fill-rule="evenodd"
          d="M 5,8 L 5,20 Q 5,21 6,21 L 18,21 Q 19,21 19,20 L 19,8 Z
             M 8.25,10 L 9.75,10 L 9.75,18 L 8.25,18 Z
             M 14.25,10 L 15.75,10 L 15.75,18 L 14.25,18 Z" />
  </g>
</svg>
