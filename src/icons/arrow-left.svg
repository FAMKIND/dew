<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
  <!-- Icon Name: arrow-left -->
  <!-- Keyline: landscape (20×14, centered) -->
  <!-- Construction: horizontal shaft from (20,12) to (4,12). Arrowhead: two short lines from (4,12)
       going upper-right to (9,7) and lower-right to (9,17). ~45° angle on each arm. -->
  <!-- Optical: arrowhead arms end at y=7 and y=17 giving a wide, confident arrowhead -->

  <g id="outline" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="20" y1="12" x2="4" y2="12" />
    <polyline points="9,7 4,12 9,17" />
  </g>

  <g id="fill" style="display:none">
    <!-- Arrow is open paths — retain stroke -->
    <line x1="20" y1="12" x2="4" y2="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
    <polyline points="9,7 4,12 9,17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
