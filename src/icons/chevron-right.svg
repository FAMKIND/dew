<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
  <!-- Icon Name: chevron-right -->
  <!-- Keyline: portrait (14×20, centered) — chevron is taller than wide -->
  <!-- Construction: two lines meeting at a rightward point. Upper arm from (8,5) to (16,12).
       Lower arm from (16,12) to (8,19). ~90° opening angle. Point precisely at center-right. -->
  <!-- Optical: arms extend far vertically (y=5 to y=19) for a confident, readable angle -->
  <!-- Usage: rotate(90deg)=down, rotate(180deg)=left, rotate(270deg)=up -->

  <g id="outline" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="8,5 16,12 8,19" />
  </g>

  <g id="fill" style="display:none">
    <!-- Chevron is an open path — retain stroke, no fill -->
    <polyline points="8,5 16,12 8,19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
