<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
  <!-- Icon Name: user -->
  <!-- Keyline: circle -->
  <!-- Construction: head circle r=4 centered at (12,8). Shoulder arc: a wide arc below centered
       at (12,21.5) approximately — effectively a path from (3,21) curving up to shoulders then
       down via (21,21), passing through approximately (12,15) at apex.
       Uses a simple arc: M 3,21 Q 12,14 21,21 — a gentle upward curve for the torso/shoulders. -->
  <!-- Optical: head center at y=8 (upper third); shoulder arc starts wide for a natural silhouette -->

  <g id="outline" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="12" cy="8" r="4" />
    <!-- Shoulders arc -->
    <path d="M 3,21 Q 12,14 21,21" />
  </g>

  <g id="fill" style="display:none">
    <!-- Head solid -->
    <circle cx="12" cy="8" r="4" fill="currentColor" stroke="none" />
    <!-- Shoulders arc (open path, keep stroke) -->
    <path d="M 3,21 Q 12,14 21,21" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
  </g>
</svg>
