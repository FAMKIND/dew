<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
  <!-- Icon Name: alert-triangle (warning) -->
  <!-- Keyline: landscape (triangle is wider than tall) -->
  <!-- Construction: equilateral triangle with rounded corners. Vertices at approx (12,3), (22,20), (2,20).
       Interior: exclamation mark — vertical line (12,9)→(12,15) and dot circle r=1 at (12,17.5). -->
  <!-- Optical: triangle nudged slightly to ensure exclamation has breathing room; rounded corners rx at path -->

  <g id="outline" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Triangle -->
    <path d="M 10.3,4 Q 12,1.5 13.7,4 L 21.7,18 Q 23,20.5 21,20.5 L 3,20.5 Q 1,20.5 2.3,18 Z" />
    <!-- Exclamation line -->
    <line x1="12" y1="9"  x2="12" y2="14" />
    <!-- Exclamation dot -->
    <circle cx="12" cy="17" r="0.75" fill="currentColor" stroke="none" />
  </g>

  <g id="fill" style="display:none">
    <!-- Solid triangle with exclamation as negative space -->
    <path fill="currentColor" stroke="none" fill-rule="evenodd"
          d="M 10.3,4 Q 12,1.5 13.7,4 L 21.7,18 Q 23,20.5 21,20.5 L 3,20.5 Q 1,20.5 2.3,18 Z
             M 11.25,9 L 12.75,9 L 12.75,14 L 11.25,14 Z
             M 12,15.75 A 0.75,0.75 0 1 0 12,17.25 A 0.75,0.75 0 1 0 12,15.75 Z" />
  </g>
</svg>
