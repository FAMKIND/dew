<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
  <!-- Icon Name: menu -->
  <!-- Keyline: landscape (20×14, centered) -->
  <!-- Construction: three horizontal lines of equal width, evenly spaced.
       Line 1: y=7, Line 2: y=12, Line 3: y=17. Each spans x=3 to x=21. -->
  <!-- Optical: 5px vertical gap between each line; even spacing reads clearly at 16px -->

  <g id="outline" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="3" y1="7"  x2="21" y2="7"  />
    <line x1="3" y1="12" x2="21" y2="12" />
    <line x1="3" y1="17" x2="21" y2="17" />
  </g>

  <g id="fill" style="display:none">
    <!-- Three solid rounded-rectangle bars -->
    <rect x="3"  y="5.75"  width="18" height="2.5" rx="1.25" fill="currentColor" stroke="none" />
    <rect x="3"  y="10.75" width="18" height="2.5" rx="1.25" fill="currentColor" stroke="none" />
    <rect x="3"  y="15.75" width="18" height="2.5" rx="1.25" fill="currentColor" stroke="none" />
  </g>
</svg>
