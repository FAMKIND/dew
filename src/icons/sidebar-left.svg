<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
  <!-- Icon Name: sidebar-left -->
  <!-- Keyline: landscape (20×14, centered) -->
  <!-- Construction: outer rectangle (3,4)→(21,20). Vertical divider at x=8, running (8,4)→(8,20).
       Left panel (x=3 to x=8) represents the sidebar. Clearly distinct from menu — this is a layout. -->
  <!-- Optical: divider at roughly 1/3 from left (5px of 18px body = 28%); rounded corners rx=2 -->

  <g id="outline" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer frame -->
    <rect x="3" y="4" width="18" height="16" rx="2" />
    <!-- Vertical divider -->
    <line x1="8" y1="4" x2="8" y2="20" />
  </g>

  <g id="fill" style="display:none">
    <!-- Outer frame outline -->
    <rect x="3" y="4" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="1.5" />
    <!-- Left sidebar panel solid-filled -->
    <path fill="currentColor" stroke="none" d="M3,6 C3,4.9 3.9,4 5,4 L8,4 L8,20 L5,20 C3.9,20 3,19.1 3,18 Z" />
    <!-- Divider line -->
    <line x1="8" y1="4" x2="8" y2="20" fill="none" stroke="currentColor" stroke-width="1.5" />
  </g>
</svg>
