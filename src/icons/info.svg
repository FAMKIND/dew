<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
  <!-- Icon Name: info -->
  <!-- Keyline: circle (r=10, cx=12, cy=12) -->
  <!-- Construction: circle r=9 centered at (12,12). Inside: lowercase 'i' —
       dot circle r=1 at (12,8.5) and vertical line (12,11)→(12,17).
       Line has round cap at bottom; slight weight at top via separate circle. -->
  <!-- Optical: 'i' stem positioned just below center so dot+stem feel balanced in the circle -->

  <g id="outline" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9" />
    <!-- 'i' dot -->
    <circle cx="12" cy="8.5" r="0.75" fill="currentColor" stroke="none" />
    <!-- 'i' stem -->
    <line x1="12" y1="11" x2="12" y2="16.5" />
  </g>

  <g id="fill" style="display:none">
    <!-- Solid circle with 'i' as negative space -->
    <path fill="currentColor" stroke="none" fill-rule="evenodd"
          d="M 12,3 A 9,9 0 1 0 12,21 A 9,9 0 1 0 12,3 Z
             M 12,7.5 A 1,1 0 1 0 12,9.5 A 1,1 0 1 0 12,7.5 Z
             M 11.25,11 L 12.75,11 L 12.75,16.5 L 11.25,16.5 Z" />
  </g>
</svg>
